<!DOCTYPE html>
<html>
<head>
<title>Memories</title>

<style>
body {
  background: #111;
  color: #eee;
  text-align: center;
  font-family: serif;
}

/* Gallery images */
img {
  width: 300px;
  margin: 10px;
  border: 3px solid #f7e98e;
  border-radius: 10px;
}

/* Zoomable images */
.zoomable {
  transition: transform 0.3s ease;
  cursor: pointer;
}

/* Fullscreen zoom effect */
.zoomed {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: rgba(0,0,0,0.9);
  z-index: 99999;
  transform: scale(1);
}
</style>

</head>
<body>

<h1>📚 Beautiful Memories ❤️</h1>

<!-- Your gallery images -->
<img src="1.jpeg" class="zoomable">

<!-- Zoom Script -->
<script>
document.addEventListener("click", function(e) {
  if (e.target.classList.contains("zoomable")) {
    e.target.classList.toggle("zoomed");
  }
});
</script>
