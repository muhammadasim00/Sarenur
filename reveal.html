<!DOCTYPE html>
<html>
<head>
<title>Reveal Gift</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  padding: 0;
  background: black;
  text-align: center;
  overflow: hidden;
}

/* Final image fullscreen */
#finalImage {
  display: none;
  width: 100%;
  height: 100vh;
  object-fit: contain;
  background: black;
}

/* Back button */
.back-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  padding: 10px 20px;
  background: #f7e98e;
  color: #3b2f1e;
  border-radius: 8px;
  font-size: 18px;
  border: none;
  z-index: 99999;
  cursor: pointer;
  display: none;
}
</style>
</head>

<body>

<!-- Back Button -->
<button class="back-btn" onclick="goBack()">⬅ Back</button>

<!-- Video -->
<video id="owlVideo" autoplay muted playsinline webkit-playsinline style="width:100%; height:100vh; object-fit:cover;">
  <source src="owl.mp4" type="video/mp4">
</video>

<!-- Final Image -->
<img id="finalImage" src="Copilot_20260516_191751.png">

<script>
// When video ends → show final image
const video = document.getElementById("owlVideo");
const finalImage = document.getElementById("finalImage");
const backBtn = document.querySelector(".back-btn");
  
// iPhone autoplay fix → unmute AFTER video starts playing
video.addEventListener("play", () => {
  video.muted = false;
});
  
video.onended = function() {
  video.style.display = "none";
  finalImage.style.display = "block";
  backBtn.style.display = "block";
};

// Back button function
function goBack() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
