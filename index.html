<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sarenur's Magical Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 0;
  background: url('Copilot_20260516_192935.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #f7e98e;
  overflow: hidden;
  font-family: 'Cormorant Garamond', serif;
  position: relative;
  z-index: 0;
}

/* Floating stars */
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: #e0e8ff;
  box-shadow: 0 0 6px #cfd9ff;
  border-radius: 70%;
  animation: twinkle 2s infinite ease-in-out;
  z-index: 3;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(2); }
}

/* Title glow */
.hp-title {
  letter-spacing: 2px;
  text-transform: uppercase;
  font-family: 'Cinzel', serif;
  text-align: center;
  font-size: 3rem;
  margin-top: 60px;
  text-shadow: 0 0 20px #f7e98e, 0 0 40px #d4b100, 0 0 80px #b38f00;
  animation: glow 2s infinite alternate;
}
@keyframes glow {
  from { text-shadow: 0 0 20px #f7e98e; }
  to { text-shadow: 0 0 60px #ffdf00; }
}

/* Floating parchment */
.parchment {
  background: rgba(243, 229, 192, 0.95);
  backdrop-filter: blur(6px);
  width: 70%;
  margin: 40px auto;
  padding: 25px;
  border: 2px solid #b38f00;
  border-radius: 10px;
  color: #3b2f1e;
  font-size: 1.4rem;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  animation: float 6s ease-in-out infinite;
  z-index: 4;
  position: relative;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* Button magic */
.hp-btn {
  display: block;
  margin: 30px auto;
  padding: 15px 30px;
  background: #3b2f1e;
  color: #f7e98e;
  border: 2px solid #d4b100;
  border-radius: 8px;
  font-size: 1.2rem;
  cursor: pointer;
  box-shadow: 0 0 10px #d4b100;
  transition: 0.3s;
  z-index: 4;
  position: relative;
}
.hp-btn:hover {
  background: #d4b100;
  color: #3b2f1e;
  box-shadow: 0 0 30px #ffdf00;
  transform: scale(1.1);
}

.wand-trail {
  position: fixed;
  width: 12px;
  height: 12px;
  background: radial-gradient(circle, #ffd700 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  box-shadow: 0 0 10px #ffdf00, 0 0 20px #ffdf00;
  animation: fadeTrail 1.8s ease-out forwards;
  z-index: 5;
}
@keyframes fadeTrail {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(2.5); }
}

/* Dark vignette overlay */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
  z-index: 1;
}

/* Fog overlay */
body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('fog_texture.png') repeat;
  opacity: 0.15;
  z-index: 2;
}

</style>
</head>

<body>
<h1 class="hp-title">✨ Happy Birthday, Sarenur ✨</h1>

<div class="parchment">
  My dearest Sarenur,<br><br>
  You are the magic Hogwarts forgot to teach.  
  Every moment with you feels like a spell — warm, bright, and unforgettable.  
  Today, the whole wizarding world celebrates you. ✨🪄
</div>

<!-- <button class="hp-btn" onclick="playMusic()">Play Music 🎵</button> -->
<button class="hp-btn" onclick="openGallery()">Reveal🎁</button>
<button class="hp-btn" onclick="openHogwarts()">Hogwarts Gallery 🏰</button>
<button class="hp-btn" onclick="openMemories()">Memories 📚</button>


<audio id="song" loop>
  <source src="harrypoter.mp3" type="audio/mpeg">
</audio>

<script>

function openHogwarts() {
  window.open("hogwarts.html", "_blank");
}

function openMemories() {
  window.open("memories.html", "_blank");
}

// Music play
window.addEventListener("load", function () {
  const song = document.getElementById("song");
  song.volume = 1.0;

  // Try autoplay
  const playPromise = song.play();

  if (playPromise !== undefined) {
    playPromise.catch(() => {
      // If autoplay is blocked, unmute on first click anywhere
      document.body.addEventListener("click", () => {
        song.play();
      }, { once: true });
    });
  }
});

// Reveal Surprise → Play video → Show final image
function openGallery() {
  const video = document.getElementById("owlVideo");
  const finalImage = document.getElementById("finalImage");

  video.style.display = "block";
  video.play();

  video.onended = function() {
    video.style.display = "none";
    finalImage.style.display = "block";
  };
}

// Wand trail
document.addEventListener("mousemove", e => {
  const trail = document.createElement("div");
  trail.classList.add("wand-trail");
  trail.style.left = e.pageX + "px";
  trail.style.top = e.pageY + "px";
  document.body.appendChild(trail);
  setTimeout(() => trail.remove(), 1000);
});

// Stars
for (let i = 0; i < 80; i++) {
  const star = document.createElement("div");
  star.classList.add("star");
  star.style.left = Math.random() * 100 + "vw";
  star.style.top = Math.random() * 100 + "vh";
  star.style.animationDelay = Math.random() * 3 + "s";
  document.body.appendChild(star);
}

</script>

<audio id="song" loop>
<source src="harrypoter.mp3" type="audio/mpeg">
</audio>

<video id="owlVideo" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:9999;" autoplay>
  <source src="owl.mp4" type="video/mp4">
</video>

<img id="finalImage" src="Copilot_20260516_191751.png" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; object-fit:contain; background:black; z-index:9999;">

</body>
</html>
