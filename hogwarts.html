<!DOCTYPE html>
<html>
<head>
<title>Hogwarts Gallery</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: serif;
}

/* Gallery images */
img {
  width: 300px;
  margin: 10px;
  border: 3px solid gold;
  border-radius: 10px;
}

/* Zoomable images */
.zoomable {
  transition: transform 0.3s ease;
  cursor: pointer;
}

/* Fullscreen zoom effect */
.zoomed {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  max-height: 100vh;
  object-fit: contain;
  background: rgba(0,0,0,0.9);
  z-index: 99999;
  transform: scale(1);
}

</style>

</head>
<body>

<h1>🏰 Hogwarts Gallery 🪄</h1>

<!-- Your gallery images -->
<img src="hog1.png" class="zoomable" onclick="this.classList.toggle('zoomed')">
<img src="hog2.png" class="zoomable" onclick="this.classList.toggle('zoomed')">
<img src="hog3.png" class="zoomable" onclick="this.classList.toggle('zoomed')">
<img src="hog4.png" class="zoomable" onclick="this.classList.toggle('zoomed')"> 
<img src="hog5.png" class="zoomable" onclick="this.classList.toggle('zoomed')">

<!-- Zoom Script -->
<script>
document.addEventListener("click", function(e) {
  if (e.target.classList.contains("zoomable")) {
    e.target.classList.toggle("zoomed");
  }
});
</script>

</body>
</html>
